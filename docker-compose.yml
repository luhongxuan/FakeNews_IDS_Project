version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db

  jupyter:
    build: ./data_pipeline
    ports:
      - "8888:8888"
    volumes:
      - ./data_pipeline:/app
      - ./data:/app/data
    env_file:
      - ./data_pipeline/.env
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --IdentityProvider.token=''
      --ServerApp.password=''
      --ServerApp.disable_check_xsrf=True
    depends_on:
      - db

  pipeline:
    build: ./data_pipeline
    volumes:
      - ./data_pipeline:/app
      - ./data:/app/data
    env_file:
      - ./data_pipeline/.env
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: misinfo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: